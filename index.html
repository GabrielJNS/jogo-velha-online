<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Online</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="background"></div>

<div class="container py-5">

    <div class="game-card mx-auto">

        <h1 class="title">
            Jogo da Velha
        </h1>

        <p class="subtitle">
            Multiplayer Online
        </p>

        <div id="game-setup" class="text-center">

            <button id="create-game" class="btn btn-create">
                Criar Nova Partida
            </button>

        </div>

        <div id="game-area" style="display: none;">

            <div id="game-status" class="status-box"></div>

            <div class="board" id="board"></div>

            <div class="d-flex flex-column flex-md-row gap-3 mt-4">

                <button id="restart-game" class="btn btn-restart w-100">
                    Reiniciar
                </button>

                <button id="share-game" class="btn btn-share w-100">
                    Compartilhar
                </button>

            </div>

        </div>

        <div id="join-area" style="display: none;">

            <div class="status-box mb-3">
                Você entrou na partida
            </div>

            <div id="join-status" class="status-box"></div>

            <div class="board mt-3" id="join-board"></div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
