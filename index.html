<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jogo da Velha Online</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

</head>

<body>

<div class="background"></div>

<div class="container py-5">

    <div class="game-card mx-auto">

        <h1 class="title">
            Jogo da Velha
        </h1>

        <p class="subtitle">
            Multiplayer Online
        </p>

        <div class="scoreboard">

            <div class="score x-score">
                X
                <span id="score-x">0</span>
            </div>

            <div class="score draw-score">
                Velhas
                <span id="score-draw">0</span>
            </div>

            <div class="score o-score">
                O
                <span id="score-o">0</span>
            </div>

        </div>

        <div id="game-setup">

            <div class="symbol-area">

                <button class="symbol-btn active" id="choose-x">
                    X
                </button>

                <button class="symbol-btn" id="choose-o">
                    O
                </button>

            </div>

            <button id="create-game" class="btn-main">
                Criar Partida
            </button>

        </div>

        <div id="game-area" style="display:none;">

            <div id="game-status" class="status-box"></div>

            <div class="board" id="board"></div>

            <div class="buttons">

                <button id="restart-game" class="btn-secondary">
                    Nova Rodada
                </button>

                <button id="share-game" class="btn-main">
                    Compartilhar
                </button>

            </div>

        </div>

        <div id="join-area" style="display:none;">

            <div id="join-status" class="status-box"></div>

            <div class="board" id="join-board"></div>

        </div>

    </div>

</div>

<div id="winner-overlay">

    <div id="winner-text"></div>

</div>

<script src="script.js"></script>

</body>

</html>
