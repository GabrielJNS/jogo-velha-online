<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Online</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <div class="top-area">

    <h1>JOGO DA VELHA</h1>
        <span>Online Multiplayer</span>

        </div>

        <div class="player-box">

            <input type="text" id="player-name" placeholder="Digite seu nome">

            <button id="create-room">
                Criar Sala
            </button>

        </div>

        <div class="room-box">

            <div class="room-info">
                <span id="room-code">Sala: ---</span>
            </div>

            <button id="share-room">
                Compartilhar Sala
            </button>

        </div>

        <div class="players">

            <div class="player-card x-card">
                <h2>X</h2>
                <p id="player-x">Esperando...</p>
            </div>

            <div class="player-card o-card">
                <h2>O</h2>
                <p id="player-o">Esperando...</p>
            </div>

        </div>

        <div class="scoreboard">

            <div class="score">
                <h3>X</h3>
                <span id="score-x">0</span>
            </div>

            <div class="score">
                <h3>Velhas</h3>
                <span id="score-draw">0</span>
            </div>

            <div class="score">
                <h3>O</h3>
                <span id="score-o">0</span>
            </div>

        </div>

        <div id="status">
            Aguardando jogador...
        </div>

        <div class="board" id="board"></div>

        <div class="buttons">

            <button id="restart-game">
                Nova Rodada
            </button>

        </div>

    </div>

</div>

<div id="overlay">

    <div id="winner-box">
        <h1 id="winner-text"></h1>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
